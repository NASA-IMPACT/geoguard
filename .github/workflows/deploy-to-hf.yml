name: Deploy to Hugging Face Space

on:
  push:
    branches: [demo/gradio]
  workflow_dispatch:  # also allow manual triggers from the Actions tab

env:
  HF_SPACE: nishparadox/geoguard-demo

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: Push branch to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git push --force \
            "https://user:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE}" \
            HEAD:main
